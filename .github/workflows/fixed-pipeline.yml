name: Fixed CI Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install deps
        run: |
          pip install -r requirements.txt || echo "No requirements.txt found"
          pip install pytest

      - name: Run Tests
        run: pytest tests/ -v || echo "No tests found, skipping"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t myapp . || echo "No Dockerfile found, skipping"

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: echo Deploying...