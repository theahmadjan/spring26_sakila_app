name: Conditional deployment

on:
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print staging environment info
        run: |
          echo "Deploying to STAGING"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"

      - name: Run staging Docker image
        run: |
          docker build -t sakila-app:staging-${{ github.sha }} .
          docker run -d --name sakila-staging \
            -e MYSQL_HOST=localhost \
            -p 5000:5000 \
            sakila-app:staging-${{ github.sha }} || true

      - name: Write Job Summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Success |" >> $GITHUB_STEP_SUMMARY

      - name: Simulate Slack notification
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Simulated production deployment
        run: |
          echo "Deploying to PRODUCTION"
          echo "Commit: ${{ github.sha }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "Automated production release for commit ${{ github.sha }}" \
            --latest

      - name: Simulate Slack notification
        run: echo "Slack notification: Deployment to production successful"
