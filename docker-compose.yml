version: '3.8'

# Define all services (containers) for our application
services:

  # Service 1: MySQL Database
  db:
    image: mysql:8.0
    container_name: sakila-db-compose
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      # Named volume for data persistence
      - sakila-db-data:/var/lib/mysql
      # Auto-import sakila database on first run
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - sakila-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # Service 2: Flask Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakila-app-compose
    restart: on-failure:5
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DATABASE}
    networks:
      - sakila-network
    depends_on:
      db:
        condition: service_healthy

  # Service 3: Adminer (Web Database UI)
  db-admin:
    image: adminer:latest
    container_name: sakila-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - sakila-network
    depends_on:
      - db

  # Service 4: Test Runner (only runs with --profile test)
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakila-test-runner
    command: python -m pytest tests/ -v
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DATABASE}
    networks:
      - sakila-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - test

# Define the custom network
networks:
  sakila-network:
    driver: bridge

# Define named volumes
volumes:
  sakila-db-data: